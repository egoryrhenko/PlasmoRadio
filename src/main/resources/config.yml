
# PlasmoRadio plugin config

# Radio voice effect applied to speakers
radio-effect:
  enabled: true
  # 0.0 = original sound, 1.0 = maximum radio distortion
  intensity: 0.5

Recipes:
  microphone:
    grid_size: 3
    shape:
      line1: "WWW"
      line2: "WQW"
      line3: "ICI"
    ingredient:
      W: "#wool"
      Q: "QUARTZ"
      I: "IRON_INGOT"
      C: "COPPER_INGOT"
  speaker:
    grid_size: 3
    shape:
      line1: "WWW"
      line2: " CS"
      line3: "WWW"
    ingredient:
      S: "#wool"
      W: "#planks"
      C: "COPPER_INGOT"



